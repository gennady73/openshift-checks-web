<script>
    $(document).ready(function () {

        const clusterId = $('#cluster-select option:selected').val();
        if (clusterId === undefined  || clusterId == '') { // no cluster is selected
            var $ttmElement = $('#terminal-toolbar-message');
            $ttmElement.text("Warning: No cluster selected.");
            $ttmElement.show();
            for (var i = 0; i < 3; i++) { // flash 3 times - refactor it
              $ttmElement.fadeOut(250).fadeIn(1450);
            }
        }
        else {
            $("#terminal-toolbar-message").hide();
            $("#terminal-toolbar-message").text("");
        }

        $("#command").on("input", function () {
            let isEmpty = !$(this).val().trim();
            const clusterId = $('#cluster-select option:selected').val();
            let isClusterIdEmpty = (clusterId === undefined  || clusterId == '')

            if (isClusterIdEmpty) { // no cluster is selected
                var $ttmElement = $('#terminal-toolbar-message');
                $ttmElement.text("Warning: No cluster selected.");
                $ttmElement.show();
                for (var i = 0; i < 3; i++) { // flash 3 times - refactor it
                    $ttmElement.fadeOut(250).fadeIn(1450);
                    $('#cluster-select').fadeOut(250).fadeIn(1450);
                }

            }
            else {
                $("#terminal-toolbar-message").hide();
                $("#terminal-toolbar-message").text("");
            }
            // Enable executeCmdBtn if input has value, disable if empty or no cluster is selected
            $("#executeCmdBtn").prop("disabled", (isEmpty || isClusterIdEmpty));

            // Opposite for testScrBtn (disable when executeCmdBtn is enabled) or no cluster is selected
            $("#testScrBtn").prop("disabled", (isClusterIdEmpty || !isEmpty));
        });
    });

    function updateSection() {
        var dataPath = $('.resource-items.file-item.selected').attr('data-path-name');
        console.log("filePath:",dataPath);
        const dataToSend = {
          command: $('input#command').val(),
          filePath: dataPath
        };

    fetch("{{ url_for('occode.execute') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataToSend)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(html => {
                // Replace the content of the specific section
                document.getElementById('section-to-update').innerHTML = html;
            })
            .catch(error => {
                console.error('Error updating section:', error);
            });
        }
</script>

<form method="post" action="javascript:updateSection()">

            <input type="text" id="test_script" name="test_script" readonly style="border:none;">
            <button class="btn btn-primary" id="testScrBtn" type="submit">Execute</button>

            <input type="text" id="command" name="command">
            <button class="btn btn-primary" id="executeCmdBtn" type="submit" disabled>Execute</button>
            <label>&nbsp;|&nbsp;</label>
            <label for="terminal-toolbar-message">Message: </label>

                  style="border-color: #f0ab00; color: red; border-style: solid; border-width: thin; padding: 3px;">
            </span>
        </div>
    </form>
                    <div id="section-to-update" class="view-lines" style="font-weight:normal; font-size:13px; height: 300px; overflow-y: scroll; background-color:black;">
    {% if command %}
        <h2>Command/Script Executed:</h2>
        <pre>{{ command }}</pre>
        {% if error %}
            <h2>Error Output:</h2>
            <pre style="color: red;">{{ result }}</pre>
        {% else %}
            <h2>Output:</h2>
            <pre>{{ result }}</pre>
        {% endif %}
    {% endif %}
